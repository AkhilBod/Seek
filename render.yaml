services:
  - type: web
    name: seek-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: TMDB_WATCH_REGIONS
        value: US
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_READ_ACCESS_TOKEN
        sync: false
      - key: OMDB_API_KEY
        sync: false
